name: Publish to PyPI

# Required GitHub Secrets:
# - PYPI_API_TOKEN: API token for publishing to PyPI (https://pypi.org/manage/account/token/)
# - TEST_PYPI_API_TOKEN: API token for TestPyPI (https://test.pypi.org/manage/account/token/)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Only publish to TestPyPI (skip real PyPI)'
        required: false
        type: boolean
        default: false

jobs:
  test-publish:
    name: Test on TestPyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install spaCy language models
        run: |
          uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl
          uv pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_md-3.8.0/en_core_web_md-3.8.0-py3-none-any.whl

      - name: Clone test fixture
        run: |
          git clone https://github.com/wende/ab tests/fixtures/elixir_project

      - name: Setup test fixtures
        run: bash tests/setup_fixtures.sh

      - name: Run tests
        run: uv run pytest

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
        run: |
          uv publish \
            --publish-url https://test.pypi.org/legacy/ \
            --token $UV_PUBLISH_TOKEN

      - name: Verify TestPyPI installation
        run: |
          sleep 30
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ cicada-mcp || echo "TestPyPI verification skipped (may fail due to dependencies)"

  publish:
    name: Publish to PyPI
    needs: test-publish
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.test_only != true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv publish --token $UV_PUBLISH_TOKEN

      - name: Verify PyPI installation
        run: |
          sleep 60
          pip install cicada-mcp
          python -c "import cicada; print(f'Cicada version: {cicada.__version__}')"
