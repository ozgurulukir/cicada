name: SCIP Language Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  test-languages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [go, java, scala, ruby, dart, c, cpp, csharp, vb]
        include:
          - language: go
            fixture: sample_go
          - language: java
            fixture: sample_java
          - language: scala
            fixture: sample_scala
          - language: ruby
            fixture: sample_ruby
          - language: dart
            fixture: sample_dart
          - language: c
            fixture: sample_c
          - language: cpp
            fixture: sample_cpp
          - language: csharp
            fixture: sample_csharp
          - language: vb
            fixture: sample_vb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Generate SCIP protobuf files
        run: |
          cd cicada/languages/scip
          protoc --python_out=. --pyi_out=. scip.proto

      - name: Install Cicada with SCIP support
        run: uv sync --extra scip

      # Language-specific indexer installation
      - name: Install Go indexer
        if: matrix.language == 'go'
        run: |
          go install github.com/sourcegraph/scip-go/cmd/scip-go@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Java/Scala indexer (coursier)
        if: matrix.language == 'java' || matrix.language == 'scala'
        run: |
          curl -fL "https://github.com/coursier/launchers/raw/master/cs-x86_64-pc-linux.gz" | gzip -d > cs
          chmod +x cs
          sudo mv cs /usr/local/bin/
          # Install sbt for Scala
          if [ "${{ matrix.language }}" = "scala" ]; then
            echo "deb https://repo.scala-sbt.org/scalasbt/debian all main" | sudo tee /etc/apt/sources.list.d/sbt.list
            curl -sL "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x2EE0EA64E40A89B84B2DF73499E82A75642AC823" | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/sbt.gpg
            sudo apt-get update && sudo apt-get install -y sbt
          fi

      - name: Install Ruby indexer
        if: matrix.language == 'ruby'
        run: |
          curl -fL "https://github.com/sourcegraph/scip-ruby/releases/download/scip-ruby-v0.4.7/scip-ruby-x86_64-linux" -o scip-ruby
          chmod +x scip-ruby
          sudo mv scip-ruby /usr/local/bin/

      - name: Install Dart indexer
        if: matrix.language == 'dart'
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-transport-https
          wget -qO- https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
          echo 'deb [signed-by=/usr/share/keyrings/dart.gpg arch=amd64] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main' | sudo tee /etc/apt/sources.list.d/dart_stable.list
          sudo apt-get update && sudo apt-get install -y dart
          export PATH="$PATH:/usr/lib/dart/bin"
          echo "/usr/lib/dart/bin" >> $GITHUB_PATH
          dart pub global activate scip_dart
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install C/C++ indexer
        if: matrix.language == 'c' || matrix.language == 'cpp'
        run: |
          curl -fL "https://github.com/sourcegraph/scip-clang/releases/download/v0.3.2/scip-clang-x86_64-linux" -o scip-clang
          chmod +x scip-clang
          sudo mv scip-clang /usr/local/bin/

      - name: Install .NET indexer
        if: matrix.language == 'csharp' || matrix.language == 'vb'
        run: |
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x ./dotnet-install.sh
          ./dotnet-install.sh --channel 8.0
          echo "$HOME/.dotnet" >> $GITHUB_PATH
          export PATH="$HOME/.dotnet:$PATH"
          dotnet tool install --global scip-dotnet
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Test indexing
        run: |
          cd tests/fixtures/${{ matrix.fixture }}
          uv run cicada claude 2>&1 | tee output.log

          # Check for successful indexing
          if grep -qi "indexed.*file" output.log; then
            echo "✅ ${{ matrix.language }}: Indexing succeeded"
            grep -i "indexed" output.log | head -1
          else
            echo "❌ ${{ matrix.language }}: Indexing failed"
            cat output.log
            exit 1
          fi

  summary:
    needs: test-languages
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          echo "═══════════════════════════════════════════"
          echo "         SCIP Language Test Summary         "
          echo "═══════════════════════════════════════════"
          echo "Check individual job results above."
